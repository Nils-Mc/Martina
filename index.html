<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martina</title>
  <style>
    :root {
      --bg-top: #f7efe4;
      --bg-bottom: #e5d4c0;
      --frame-dark: #7d4f2d;
      --frame-mid: #b9814b;
      --frame-light: #f4d8b3;
      --shadow: rgba(70, 38, 14, 0.22);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 35%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: Georgia, "Times New Roman", serif;
    }

    .frame {
      width: min(92vw, 1100px);
      padding: clamp(12px, 2vw, 24px);
      border: 10px solid var(--frame-dark);
      border-radius: 28px;
      background: linear-gradient(135deg, var(--frame-light), var(--frame-mid));
      box-shadow:
        0 24px 60px var(--shadow),
        inset 0 0 0 3px rgba(255, 255, 255, 0.45),
        inset 0 0 24px rgba(255, 255, 255, 0.3);
    }

    .image-wrap {
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.65);
      box-shadow: inset 0 0 0 2px rgba(125, 79, 45, 0.18);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 82vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="image-wrap">
      <img src="assets/pic1.jpg" alt="Groß dargestelltes Bild">
    </div>
  </main>
</body>
</html>
